version: '3.8'

services:
  db:
    image: postgres:15
    container_name: emissions-db
    environment:
      POSTGRES_DB: emissions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emissions"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vehicle-emission-analyzer
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - yolo-models:/root/.cache/ultralytics
    environment:
      - DEBUG=false
      - YOLO_MODEL=yolov8n.pt
      - FRAME_SKIP=5
      - CONFIDENCE_THRESHOLD=0.5
      - DATABASE_URL=postgres://postgres:postgres@db:5432/emissions
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  frontend:
    image: node:20-alpine
    container_name: emissions-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - app
    restart: unless-stopped

  # Optional: GPU-enabled version
  app-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: vehicle-emission-analyzer-gpu
    ports:
      - "8001:8000"
    volumes:
      - ./uploads:/app/uploads
      - yolo-models:/root/.cache/ultralytics
    environment:
      - DEBUG=false
      - YOLO_MODEL=yolov8n.pt
      - DATABASE_URL=postgres://postgres:postgres@db:5432/emissions
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  yolo-models:
  postgres_data:
  frontend_node_modules:
